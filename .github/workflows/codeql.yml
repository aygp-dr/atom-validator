# Security scanning for Clojure
# Note: CodeQL doesn't support Clojure (.clj files)
# Using clj-kondo for static analysis and nvd-clojure for CVE scanning

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday

jobs:
  lint:
    name: Static Analysis (clj-kondo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Run clj-kondo
        run: clojure -M:lint

  nvd-check:
    name: CVE Scan (nvd-clojure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Check dependencies for CVEs
        run: |
          clojure -Ttools install nvd-clojure/nvd-clojure '{:mvn/version "RELEASE"}' :as nvd
          clojure -Tnvd nvd.task/check :classpath '"'"$(clojure -Spath)"'"' || true
        continue-on-error: true  # Advisory only for now
