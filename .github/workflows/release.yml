name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_tag:
        description: 'Create tag from current commit count'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}

      - name: Compute version
        id: version
        run: |
          VERSION="0.1.$(git rev-list --count HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Run tests
        run: clojure -X:test

      - name: Lint
        run: clojure -M:lint

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Build JAR
        run: clojure -T:build jar

      - name: Audit JAR for secrets
        run: bin/validate-deploy

      - name: Deploy to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy

      - name: E2E verify publish on Clojars
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://repo.clojars.org/org/clojars/apace/atom-validator/${VERSION}/atom-validator-${VERSION}.pom"
          echo "Waiting for Clojars to propagate..."
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null "$URL"; then
              echo "✓ v${VERSION} verified on Clojars (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "✗ v${VERSION} NOT found on Clojars after 5 attempts"
          exit 1

      - name: Install git-cliff
        run: |
          curl -sL https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/git-cliff-2.12.0/git-cliff /usr/local/bin/

      - name: Generate release notes
        run: |
          git-cliff --tag "${{ steps.version.outputs.tag }}" --unreleased --strip header > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: target/*.jar
          generate_release_notes: false

      - name: Trigger cljdoc build
        run: |
          curl -sX POST "https://cljdoc.org/api/request-build2" \
            -d "project=org.clojars.apace/atom-validator&version=${{ steps.version.outputs.version }}" \
            || echo "cljdoc trigger failed (non-fatal)"
