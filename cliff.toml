# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
            {% if commit.breaking %} [**BREAKING**]{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^docs", group = "<!-- 2 -->Documentation" },
  { message = "^ci", group = "<!-- 3 -->CI/CD" },
  { message = "^chore", group = "<!-- 4 -->Chores" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^refactor", group = "<!-- 6 -->Refactor" },
  { message = "^perf", group = "<!-- 7 -->Performance" },
  { message = "^style", skip = true },
  { message = "^Merge", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
